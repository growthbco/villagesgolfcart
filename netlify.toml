[build]
  command = "echo 'Static site - no build required'"
  publish = "public"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/3-day-golf-cart-rental-villages.html"
  to = "/weekly-golf-cart-rental-villages.html"
  status = 301
  force = true

[[redirects]]
  from = "/daily-golf-cart-rental-villages.html"
  to = "/weekly-golf-cart-rental-villages.html"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"