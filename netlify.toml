[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ===========================================================================
# 301 redirects — preserve SEO equity from old .html URLs to new pretty URLs
# ===========================================================================

# Cart pages — old non-deluxe to new deluxe URLs
[[redirects]]
  from = "/2-passenger-golf-cart.html"
  to = "/2-passenger-deluxe-golf-cart"
  status = 301
  force = true

[[redirects]]
  from = "/2-passenger-golf-cart"
  to = "/2-passenger-deluxe-golf-cart"
  status = 301
  force = true

[[redirects]]
